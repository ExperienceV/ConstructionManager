{% extends "base.html" %}

{% block title %}{{ "Editar" if trabajador else "Nuevo" }} trabajador - ConstructManager{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    <div class="mb-6">
        <a href="{{ '/personal/' ~ trabajador.id if trabajador else '/personal' }}" class="text-sm text-amber-400 hover:text-amber-300">Volver</a>
        <h1 class="text-3xl font-extrabold text-white mt-2">{{ "Editar trabajador" if trabajador else "Nuevo trabajador" }}</h1>
    </div>
    <form method="post" action="{{ '/personal/' ~ trabajador.id ~ '/editar' if trabajador else '/personal' }}" class="glass-panel rounded-xl p-6 space-y-5">
        <div>
            <label class="block text-sm font-semibold text-slate-200 mb-2">Nombre</label>
            <input name="nombre" required value="{{ trabajador.nombre if trabajador else '' }}" class="w-full rounded-lg bg-slate-900 border border-slate-700 px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-amber-500">
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-200 mb-2">Rol</label>
            <select name="rol" class="w-full rounded-lg bg-slate-900 border border-slate-700 px-4 py-3 text-white">
                {% for rol in roles %}
                <option value="{{ rol }}" {% if trabajador and trabajador.rol == rol %}selected{% endif %}>{{ rol }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-200 mb-2">Tarifa/hora</label>
            <input name="tarifa_hora" type="number" step="0.01" min="0" required value="{{ trabajador.tarifa_hora if trabajador else '' }}" class="w-full rounded-lg bg-slate-900 border border-slate-700 px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-amber-500">
        </div>
        <div class="flex justify-end gap-3 pt-2">
            <a href="/personal" class="px-4 py-2 rounded-lg border border-slate-700 text-sm text-slate-200 hover:bg-slate-800">Cancelar</a>
            <button class="px-4 py-2 rounded-lg bg-amber-500 text-sm font-semibold text-slate-950 hover:bg-amber-400">Guardar</button>
        </div>
    </form>
</div>
{% endblock %}
