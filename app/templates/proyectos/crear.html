{% extends "base.html" %}

{% block title %}{{ "Editar" if proyecto else "Nuevo" }} proyecto - ConstructManager{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    <div class="mb-6">
        <a href="{{ '/proyectos/' ~ proyecto.id if proyecto else '/proyectos' }}" class="text-sm text-amber-400 hover:text-amber-300">Volver</a>
        <h1 class="text-3xl font-extrabold text-white mt-2">{{ "Editar proyecto" if proyecto else "Nuevo proyecto" }}</h1>
    </div>
    <form method="post" action="{{ '/proyectos/' ~ proyecto.id ~ '/editar' if proyecto else '/proyectos' }}" class="glass-panel rounded-xl p-6 space-y-5">
        <div>
            <label class="block text-sm font-semibold text-slate-200 mb-2">Nombre</label>
            <input name="nombre" required value="{{ proyecto.nombre if proyecto else '' }}" class="w-full rounded-lg bg-slate-900 border border-slate-700 px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-amber-500">
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-200 mb-2">Descripción</label>
            <textarea name="descripcion" rows="4" class="w-full rounded-lg bg-slate-900 border border-slate-700 px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-amber-500">{{ proyecto.descripcion if proyecto and proyecto.descripcion else '' }}</textarea>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-sm font-semibold text-slate-200 mb-2">Inversión total</label>
                <input name="inversion_total" type="number" step="0.01" min="0" value="{{ proyecto.inversion_total if proyecto and proyecto.inversion_total is not none else '' }}" class="w-full rounded-lg bg-slate-900 border border-slate-700 px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-200 mb-2">Fecha inicio</label>
                <input name="fecha_inicio" type="date" required value="{{ proyecto.fecha_inicio if proyecto else '' }}" class="w-full rounded-lg bg-slate-900 border border-slate-700 px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-200 mb-2">Fin estimado</label>
                <input name="fecha_estimada_fin" type="date" value="{{ proyecto.fecha_estimada_fin if proyecto and proyecto.fecha_estimada_fin else '' }}" class="w-full rounded-lg bg-slate-900 border border-slate-700 px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>
        </div>
        <div class="flex justify-end gap-3 pt-2">
            <a href="/proyectos" class="px-4 py-2 rounded-lg border border-slate-700 text-sm text-slate-200 hover:bg-slate-800">Cancelar</a>
            <button class="px-4 py-2 rounded-lg bg-amber-500 text-sm font-semibold text-slate-950 hover:bg-amber-400">Guardar</button>
        </div>
    </form>
</div>
{% endblock %}
