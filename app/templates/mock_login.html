{% extends "base.html" %}

{% block title %}Developer Mock Login - ConstructManager{% endblock %}

{% block content %}
<div class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <!-- Developer Warning Badge -->
        <div class="flex justify-center mb-4">
            <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold bg-amber-500/10 text-amber-500 border border-amber-500/30">
                ⚙️ Entorno de Desarrollo (MOCK_AUTH=true)
            </span>
        </div>

        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight text-white mb-2 uppercase">
                Construct<span class="text-amber-500">Manager</span>
            </h1>
            <p class="text-sm text-slate-400">Simulador de Login de Google</p>
        </div>

        <!-- Mock Login Form Card -->
        <div class="glass-panel p-8 rounded-3xl shadow-2xl relative overflow-hidden">
            <form action="/auth/mock-login" method="POST" class="space-y-6">
                
                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-300 mb-2">Correo Electrónico</label>
                    <input type="email" name="email" id="email" required placeholder="ejemplo@correo.com"
                           class="w-full px-4 py-3 bg-slate-900 border border-slate-800 focus:border-amber-500 rounded-2xl text-slate-100 placeholder-slate-600 focus:outline-none focus:ring-1 focus:ring-amber-500 transition duration-200">
                </div>

                <div>
                    <label for="nombre" class="block text-sm font-semibold text-slate-300 mb-2">Nombre Completo</label>
                    <input type="text" name="nombre" id="nombre" required placeholder="Juan Pérez"
                           class="w-full px-4 py-3 bg-slate-900 border border-slate-800 focus:border-amber-500 rounded-2xl text-slate-100 placeholder-slate-600 focus:outline-none focus:ring-1 focus:ring-amber-500 transition duration-200">
                </div>

                <div>
                    <label for="rol" class="block text-sm font-semibold text-slate-300 mb-2">Rol Asignado</label>
                    <select name="rol" id="rol"
                            class="w-full px-4 py-3 bg-slate-900 border border-slate-800 focus:border-amber-500 rounded-2xl text-slate-100 focus:outline-none focus:ring-1 focus:ring-amber-500 transition duration-200">
                        <option value="null">Pendiente de activación (NULL)</option>
                        <option value="ingeniero">Ingeniero (Propietario / Acceso total)</option>
                        <option value="residente">Residente (Operativo)</option>
                    </select>
                </div>

                <!-- Fast Presets for Quick Testing -->
                <div class="pt-2 border-t border-slate-900">
                    <span class="block text-xs font-semibold text-slate-500 mb-3 uppercase tracking-wider">Perfiles rápidos:</span>
                    <div class="flex flex-wrap gap-2">
                        <button type="button" onclick="setPreset('ingeniero@obra.com', 'Ingeniero Carlos', 'ingeniero')"
                                class="px-3 py-1.5 text-xs font-medium bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg border border-slate-700/50 transition">
                            👷 Ingeniero
                        </button>
                        <button type="button" onclick="setPreset('residente@obra.com', 'Residente María', 'residente')"
                                class="px-3 py-1.5 text-xs font-medium bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg border border-slate-700/50 transition">
                            📋 Residente
                        </button>
                        <button type="button" onclick="setPreset('nuevo@obra.com', 'Nuevo Usuario', 'null')"
                                class="px-3 py-1.5 text-xs font-medium bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg border border-slate-700/50 transition">
                            ⏳ Pendiente
                        </button>
                    </div>
                </div>

                <button type="submit"
                        class="flex items-center justify-center w-full px-5 py-3 text-sm font-semibold text-slate-950 bg-amber-500 hover:bg-amber-400 rounded-2xl shadow-lg shadow-amber-500/10 transition duration-200 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:ring-offset-2 focus:ring-offset-slate-950">
                    Simular Login
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    function setPreset(email, name, role) {
        document.getElementById('email').value = email;
        document.getElementById('nombre').value = name;
        document.getElementById('rol').value = role;
    }
</script>
{% endblock %}
